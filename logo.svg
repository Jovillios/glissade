<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <!-- Catppuccin Mocha palette -->
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1e1e2e" />
            <stop offset="100%" stop-color="#181825" />
        </linearGradient>
        <linearGradient id="slide1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#89b4fa" />
            <stop offset="100%" stop-color="#74c7ec" />
        </linearGradient>
        <linearGradient id="slide2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#b4befe" />
            <stop offset="100%" stop-color="#89b4fa" />
        </linearGradient>
        <linearGradient id="slide3" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#cba6f7" />
            <stop offset="100%" stop-color="#b4befe" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#11111b" flood-opacity="0.5" />
        </filter>
    </defs>

    <!-- Background circle -->
    <circle cx="256" cy="256" r="246" fill="url(#bg)" stroke="#313244" stroke-width="4" />

    <!-- Three slides stacked diagonally — glissade motion -->
    <g filter="url(#shadow)">
        <!-- Back slide (top-left, most faded) -->
        <rect x="100" y="100" width="180" height="120" rx="10" fill="url(#slide1)" opacity="0.45"
            transform="rotate(-6 190 160)" />
        <!-- Fake content lines on back slide -->
        <rect x="120" y="120" width="80" height="8" rx="4" fill="#1e1e2e" opacity="0.3"
            transform="rotate(-6 190 160)" />
        <rect x="120" y="138" width="120" height="5" rx="2.5" fill="#1e1e2e" opacity="0.2"
            transform="rotate(-6 190 160)" />
        <rect x="120" y="150" width="100" height="5" rx="2.5" fill="#1e1e2e" opacity="0.2"
            transform="rotate(-6 190 160)" />

        <!-- Middle slide -->
        <rect x="155" y="180" width="200" height="135" rx="10" fill="url(#slide2)" opacity="0.7"
            transform="rotate(-3 255 247)" />
        <!-- Fake content lines on middle slide -->
        <rect x="178" y="203" width="90" height="9" rx="4.5" fill="#1e1e2e" opacity="0.3"
            transform="rotate(-3 255 247)" />
        <rect x="178" y="222" width="140" height="6" rx="3" fill="#1e1e2e" opacity="0.2"
            transform="rotate(-3 255 247)" />
        <rect x="178" y="236" width="120" height="6" rx="3" fill="#1e1e2e" opacity="0.2"
            transform="rotate(-3 255 247)" />
        <rect x="178" y="250" width="130" height="6" rx="3" fill="#1e1e2e" opacity="0.2"
            transform="rotate(-3 255 247)" />

        <!-- Front slide (bottom-right, most prominent) -->
        <rect x="195" y="255" width="220" height="150" rx="12" fill="url(#slide3)" opacity="1"
            transform="rotate(0 305 330)" />
        <!-- Fake content lines on front slide -->
        <rect x="222" y="282" width="100" height="11" rx="5.5" fill="#1e1e2e" opacity="0.35" />
        <rect x="222" y="304" width="160" height="7" rx="3.5" fill="#1e1e2e" opacity="0.2" />
        <rect x="222" y="320" width="140" height="7" rx="3.5" fill="#1e1e2e" opacity="0.2" />
        <rect x="222" y="336" width="155" height="7" rx="3.5" fill="#1e1e2e" opacity="0.2" />
        <rect x="222" y="352" width="100" height="7" rx="3.5" fill="#1e1e2e" opacity="0.2" />
    </g>

    <!-- Glide arrow — a subtle curved swoosh suggesting motion -->
    <path d="M 130 370 Q 200 420, 370 340" stroke="#f5c2e7" stroke-width="5" stroke-linecap="round"
        fill="none" opacity="0.6" />
    <path d="M 355 335 L 370 340 L 358 353" stroke="#f5c2e7" stroke-width="4" stroke-linecap="round"
        stroke-linejoin="round" fill="none" opacity="0.6" />
</svg>